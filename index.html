<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SAOCO PERFUMES — Asistente Virtual</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">

  <!-- Único CSS del chat -->
  <link rel="stylesheet" href="css/main.css">
</head>
<body>

<!-- LOADING OVERLAY -->
<div id="loading-overlay">
  <div class="loader-brand">SAOCO</div>
  <div class="loader-sub">PERFUMES</div>
  <div class="loader-bar"><div class="loader-progress"></div></div>
</div>

<!-- MAIN APP -->
<div id="app">

  <!-- HEADER -->
  <div id="header">
    <div class="bot-avatar-header">
      <img src="img/logo.jpeg" alt="Logo"
           style="width:100%;height:100%;object-fit:cover;border-radius:50%;">
      <span class="online-dot"></span>
    </div>
    <div class="header-info">
      <div class="header-brand">SAOCO PERFUMES</div>
      <div class="header-status">Asistente Virtual • En línea</div>
    </div>
    <div class="header-actions">
      <!-- Sin onclick — el controller añade el listener -->
      <button id="theme-btn" title="Cambiar tema">
        <span class="theme-icon" id="theme-icon">☀️</span>
        <span class="theme-label" id="theme-label">Día</span>
      </button>
      <button id="config-btn" title="Configuración">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 15.5A3.5 3.5 0 0 1 8.5 12 3.5 3.5 0 0 1 12 8.5a3.5 3.5 0 0 1 3.5 3.5 3.5 3.5 0 0 1-3.5 3.5m7.43-2.92c.04-.34.07-.69.07-1.08 0-.39-.03-.74-.07-1.08l2.32-1.82c.21-.16.27-.46.13-.7l-2.2-3.81c-.14-.24-.42-.32-.66-.24l-2.74 1.1c-.57-.44-1.17-.8-1.84-1.07L14 2.42C13.96 2.17 13.72 2 13.44 2h-4.38c-.28 0-.52.17-.56.42L8.12 5.07C7.45 5.34 6.85 5.7 6.28 6.14L3.54 5.04c-.24-.08-.52 0-.66.24L.68 9.09c-.14.24-.08.54.13.7l2.32 1.82C3.09 11.96 3.06 12.31 3.06 12.7c0 .39.03.74.07 1.08L.81 15.6c-.21.16-.27.46-.13.7l2.2 3.81c.14.24.42.32.66.24l2.74-1.1c.57.44 1.17.8 1.84 1.07l.38 2.65c.04.25.28.42.56.42h4.38c.28 0 .52-.17.56-.42l.38-2.65c.67-.27 1.27-.63 1.84-1.07l2.74 1.1c.24.08.52 0 .66-.24l2.2-3.81c.14-.24.08-.54-.13-.7l-2.32-1.82z"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- MESSAGES -->
  <div id="messages"></div>

  <!-- TYPING INDICATOR -->
  <div id="typing-indicator">
    <div class="typing-avatar">
      <img src="img/logo.jpeg" alt="Logo"
           style="width:100%;height:100%;object-fit:cover;border-radius:50%;">
    </div>
    <div class="typing-bubble">
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
    </div>
  </div>

  <!-- QUICK REPLIES -->
  <div id="quick-replies"></div>

  <!-- INPUT AREA -->
  <div id="input-area">
    <div class="input-wrapper">
      <textarea
        id="user-input"
        placeholder="Escribe tu mensaje o un número..."
        rows="1"
        autocomplete="off"
        spellcheck="false"
      ></textarea>
      <!-- Sin onclick — el controller añade el listener -->
      <button id="send-btn" title="Enviar">
        <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
      </button>
    </div>
    <div class="input-hint">Escribe un número o "menú" para volver</div>
  </div>

</div><!-- /app -->

<!-- CONFIG PANEL -->
<div id="config-panel">
  <div class="config-sheet">
    <div class="config-handle"></div>
    <div class="config-title">⚙ Opciones</div>
    <div class="config-subtitle">
      Aquí puedes limpiar el historial de conversación.
    </div>
    <!-- Sin onclick — el controller añade el listener -->
    <button class="config-clear-btn" id="clear-chat-btn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
        <path d="M9 3v1H4v2h1v13a2 2 0 002 2h10a2 2 0 002-2V6h1V4h-5V3H9zm0 5h2v9H9V8zm4 0h2v9h-2V8z"/>
      </svg>
      Limpiar historial de chat
    </button>
    <button class="config-close-btn" id="close-config-btn">Cerrar</button>
  </div>
</div>

<!-- Punto de entrada — type="module" habilita ES Modules -->
<script type="module">
  import { ChatController } from './js/controllers/ChatController.js';
  window.addEventListener('DOMContentLoaded', () => ChatController.init());
</script>

</body>
</html>
